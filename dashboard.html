<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav>

<h2>All Issues</h2>

<div>

<input id="searchInput" placeholder="Search issues">
<button onclick="searchIssue()">Search</button>

</div>

</nav>


<section class="tabs">

<button id="allBtn" onclick="loadAll()" class="active">All</button>
<button id="openBtn" onclick="loadOpen()">Open</button>
<button id="closedBtn" onclick="loadClosed()">Closed</button>

</section>


<div class="issue-info">

<img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="40">

<h3 id="issueCount">0 Issues</h3>

<div>

<button id="openCount">Open</button>
<button id="closedCount">Closed</button>

</div>

</div>


<div id="spinner" class="spinner">Loading...</div>

<div id="issuesContainer" class="grid"></div>


<div id="modal" class="modal">

<div class="modal-content">

<span onclick="closeModal()" class="close">&times;</span>

<div id="modalData"></div>

</div>

</div>


<script src="js/dashboard.js"></script>

</body>
</html>
