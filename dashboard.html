<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Issues Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />

</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div class="navbar bg-base-100 shadow-md">

<div class="flex-1">
<a class="text-xl font-bold">Issues Tracker</a>
</div>

<div class="flex-none gap-2">

<input
id="searchInput"
type="text"
placeholder="Search"
class="input input-bordered"
/>

<button onclick="searchIssues()" class="btn btn-primary">
Search
</button>

</div>
</div>

<!-- Tabs -->
<div class="flex justify-center gap-4 mt-6">

<button class="btn btn-active" onclick="loadIssues()">
All
</button>

<button class="btn" onclick="filterIssues('open')">
Open
</button>

<button class="btn" onclick="filterIssues('closed')">
Closed
</button>

</div>

<!-- Issues Container -->
<div
id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-6"
>

</div>

<!-- Modal -->
<dialog id="issueModal" class="modal">

<div class="modal-box">

<h3 id="modalTitle" class="font-bold text-lg"></h3>

<p id="modalDescription" class="py-4"></p>

<div class="modal-action">
<form method="dialog">
<button class="btn">Close</button>
</form>
</div>

</div>

</dialog>

<script src="js/issues.js"></script>

</body>
</html>
